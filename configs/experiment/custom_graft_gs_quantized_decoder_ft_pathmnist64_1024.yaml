seed: 123
device: auto

dataset:
  name: pathmnist
  root: data/medmnist
  size: 64
  batch_size: 16
  num_workers: 4
  download: true
  normalize: true
  as_rgb: true

tokenizer:
  name: graft_gs
  checkpoint_path: checkpoints/tokenizer/pathmnist64_graft_gs_v2.pt
  image_size: 64
  image_channels: 3
  num_primitives: 256
  primitive_feature_dim: 64
  hidden_channels: 192
  min_scale: 0.006
  max_scale: 0.12
  max_position_offset: 0.025
  renderer_chunk_size: 64

codebook:
  path: checkpoints/tokenizer/pathmnist64_graft_gs_feature_codebook_1024.pt
  num_codes: 1024

quantized_finetune:
  output_checkpoint_path: checkpoints/tokenizer/pathmnist64_graft_gs_v2_quantized_decoder_1024.pt
  train_renderer: true
  train_decoder: true
  epochs: 20
  lr: 0.00005
  weight_decay: 0.0
  mixed_precision: true
  grad_clip_norm: 1.0
  reconstruction_l1_weight: 1.0
  reconstruction_mse_weight: 0.25
  sample_every_epochs: 1
  save_every_epochs: 1

logging:
  run_name: graft_gs_quantized_decoder_ft_pathmnist64_1024